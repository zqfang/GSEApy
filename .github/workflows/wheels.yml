# modified from https://github.com/Qiskit/rustworkx/blob/main/.github/workflows/wheels.yml
name: Wheel Builds

on:
  release:
    types: [published]

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v4
      - name: Build sdist
        run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: >
            yum install libatomic -y &&
            curl https://sh.rustup.rs -sSf | sh -s -- -y
          CIBW_ENVIRONMENT_LINUX: 'PATH="$PATH:$HOME/.cargo/bin"'
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64:latest
          CIBW_SKIP: pp* *win32 *musl*
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.8"
          CIBW_PRERELEASE_PYTHONS: "true"
          CIBW_BEFORE_BUILD: pip install -U setuptools-rust
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_wheels_aarch64:
    name: Build linux aarch64 wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: >
            yum install libatomic -y &&
            curl https://sh.rustup.rs -sSf | sh -s -- -y
          CIBW_ENVIRONMENT_LINUX: 'PATH="$PATH:$HOME/.cargo/bin"'
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux2014_aarch64:latest
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64:latest
          CIBW_ARCHS_LINUX: aarch64
          CIBW_SKIP: pp* *win32 *musl*
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.8"
          CIBW_PRERELEASE_PYTHONS: "true"
          CIBW_BEFORE_BUILD: pip install -U setuptools-rust
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-aarch64
          path: wheelhouse/*.whl

  build_wheels_win32:
    name: Build wheels on win32
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 'latest'
          architecture: 'x86'
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: i686-pc-windows-msvc
      - name: Force win32 rust
        run: rustup default stable-i686-pc-windows-msvc
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: pp* *amd64 *musl*
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.8"
          CIBW_PRERELEASE_PYTHONS: "true"
          CIBW_BEFORE_BUILD: pip install -U setuptools-rust
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-win32
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [sdist, build_wheels, build_wheels_aarch64, build_wheels_win32]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@v4
      - name: Publish to PyPI
        run: uv publish dist/* --token ${{ secrets.PYPI_API_TOKEN }}
